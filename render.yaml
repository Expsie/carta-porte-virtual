services:
  - type: web
    name: carta-porte-virtual
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_BASE_URL 
        sync: 
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin 
      - key: ADMIN_PASSWORD
        sync: 
      - key: SUPABASE_URL
        sync: 
      - key: SUPABASE_SERVICE_ROLE_KEY 
        sync: 
      - key: SUPABASE_BUCKET
        value: deca-private
      - key: RETENTION_DAYS
        value: 365
        
